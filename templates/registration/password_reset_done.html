{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | DigiPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/main.js' %}"></script>
</head>
<body>
    <div class="login-page">
        <div class="login-card card">
            <div class="card-body" style="text-align:center;">
                <div class="login-logo" style="background:#16a34a;">
                    <svg width="28" height="28" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                </div>
                <h1>Check Your Email</h1>
                <p class="subtitle">If an account exists with that email, we've sent a password reset link. Please check your inbox (and spam folder).</p>
                <div style="margin-top:24px;">
                    <a href="{% url 'login' %}" class="btn btn-primary" style="display:inline-flex;justify-content:center;padding:10px 24px;">
                        Back to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
